<html>

    <title>Investment Scenario Advisor</title>

      const repo = "/navigating-down-markets";
      const path = window.location.pathname;
      const normalized = path.startsWith(repo) ? path.slice(repo.length) : path;
      window.location.replace(repo + "/" + window.location.search + "#" + normalized);
    </script>
  </head>
